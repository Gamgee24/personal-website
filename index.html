<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 16px;
  }

  body {
    background: #fff;
    color: #000;
    font-family: Georgia, 'Times New Roman', Times, serif;
    line-height: 1.6;
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  main {
    max-width: 640px;
    margin: 0 auto;
    font-size: 1rem;
  }

  p {
    margin-bottom: 1.4em;
  }

  p:last-child {
    margin-bottom: 0;
  }

  a {
    color: #000;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  a:hover {
    text-decoration: none;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 3.2em;
    align-items: start;
  }

  .image-grid img {
    display: block;
    width: 100%;
    height: auto;
  }

  .links {
    margin-top: 3.2em;
    display: flex;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .links a {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.85rem;
    color: #000;
    text-decoration: none;
    border-bottom: 1px solid #000;
    padding-bottom: 1px;
  }

  .links a:hover {
    border-bottom-color: transparent;
  }

  @media (max-width: 720px) {
    body {
      max-width: 640px;
    }

    .image-grid {
      grid-template-columns: 1fr;
      gap: 18px;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 36px 18px 60px;
    }

    .links {
      gap: 14px;
    }
  }
</style>
